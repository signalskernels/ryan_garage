name: CI — build check

# Deploys are handled by Netlify's native git integration (production on `main`,
# deploy previews on `dev`/PRs). This workflow is a fast BUILD/CI GATE only — it
# does not deploy (avoids double-deploys). It's the required status check on
# `main`, so a broken build blocks the merge before Netlify even builds.
#
# NOTE: keep the job id `build-deploy` — branch protection requires that context.

on:
  push:
    branches: [main, dev]
    paths:
      - 'site/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        env:
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
        run: npm run build
