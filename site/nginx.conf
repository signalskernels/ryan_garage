server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip text assets
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

  # Astro "directory" format → /page/ resolves to /page/index.html.
  # Also allow /page (no slash) and fall back to the 404 page.
  location / {
    try_files $uri $uri/ $uri.html =404;
  }

  # Long-cache fingerprinted build assets (Astro hashes filenames under /_astro)
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Cache fonts + favicon
  location ~* \.(woff2|woff|ttf|png|jpg|jpeg|webp|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  error_page 404 /404.html;

  # The lead form posts via AJAX; the static server can't capture it, so a
  # POST to "/" just returns the homepage (the form JS shows success either
  # way). On Netlify, native form capture handles this.
  location = / {
    try_files $uri /index.html;
  }
}
