        <div class="entry-content">
            <div class="google-review-page">

<style>body{
        margin: 0;
    }
    .google-review-page {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: calc(100vh - 20px);
        min-height: 500px;
        background-color: #f9f6f1;
        padding: 10px;
    }
    .google-review-page h1 {
        margin-bottom: 30px;
        font-style: italic;
        font-weight: 700;
        font-family: 'Trebuchet','Trebuchet MS',Helvetica,Arial,Lucida,sans-serif;
        order: 1;
        font-size: 30px;
    }
    .google-review-page h2 {
        font-weight: 500;
        font-family: 'Trebuchet','Trebuchet MS',Helvetica,Arial,Lucida,sans-serif;
        order: 3;
        font-size: 26px;
    }
    .divider-block {
        order: 2;
        display: block;
        height: 2px;
        width: 100%;
        background: rgba(0,0,0,0.2);
        margin-bottom: 30px;
    }
    .content-block {
        order: 5;
        font-size: 17px;
        margin-bottom: 30px;
        font-style: italic;
        font-weight: 500;
        font-family: 'Trebuchet','Trebuchet MS',Helvetica,Arial,Lucida,sans-serif;
        color: #333;
    }
    .review-image-block {
        order: 4;
        width: 70%;
        margin: 30px auto;
        text-align: center;
    }
    .review-image-block a {
        border-radius: 4px 4px 4px 4px;
        overflow: hidden;
        border-width: 3px;
        border-color: #FFFFFF;
        box-shadow: 0px 2px 18px 0px rgba(0,0,0,0.3);
    }
    .reviewButton {
        cursor: pointer;
        width: 100%;
        max-width: 360px;
        max-height: 140px;
        display: inline-block;
        background-size: contain;
    }
    @media only screen and (min-width: 600px) {
        .google-review-page h1 {
            order: 1;
            margin-bottom: 0;
        }
        .google-review-page h2 {
            order: 2;
        }
        .divider-block {
            order: 3;
            margin-top: 30px;
            max-width: 1080px;
        }
        .content-block {
            order: 4;
            margin-bottom: 0;
        }
        .review-image-block {
            order: 5;
        }
    }</style>
